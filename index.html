<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integration Bee Controller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="controller-body">
  <header id="controller-header">
    <h1 id="title">Integration Bee Controller</h1>
  </header>

  <div id="controller-layout">
    <!-- Left sidebar: problem list -->
    <aside id="sidebar">
      <div id="problem-list"></div>
      <div id="sidebar-buttons">
        <button id="btn-display">Display</button>
        <button id="btn-clear">Clear</button>
        <button id="btn-toggle-answer">Toggle Answer</button>
        <button id="btn-open-display">Open Display Window</button>
        <button id="btn-admin" onclick="window.location.href='/admin.html'">Edit Problems</button>
      </div>
    </aside>

    <!-- Center: preview -->
    <main id="preview">
      <div id="preview-problem" class="preview-box">
        <img id="preview-problem-img" src="" alt="Problem preview">
      </div>
      <div id="preview-answer" class="preview-box">
        <div class="preview-answer-label">Answer:</div>
        <img id="preview-answer-img" src="" alt="Answer preview">
      </div>
    </main>

    <!-- Right panel: scores & timer -->
    <aside id="right-panel">
      <div class="player-section">
        <label>Player 1 Name</label>
        <input type="text" id="p1-name" placeholder="Player 1">
        <label>Score 1</label>
        <div class="score-controls">
          <button class="score-btn" data-player="1" data-delta="-1">−</button>
          <span id="p1-score" class="score-value">0</span>
          <button class="score-btn" data-player="1" data-delta="1">+</button>
        </div>
      </div>

      <div class="player-section">
        <label>Player 2 Name</label>
        <input type="text" id="p2-name" placeholder="Player 2">
        <label>Score 2</label>
        <div class="score-controls">
          <button class="score-btn" data-player="2" data-delta="-1">−</button>
          <span id="p2-score" class="score-value">0</span>
          <button class="score-btn" data-player="2" data-delta="1">+</button>
        </div>
      </div>

      <div id="timer-section">
        <label>Timer (seconds)</label>
        <input type="number" id="timer-duration" value="180" min="1" max="600">
        <div id="timer-display" class="timer-value">3:00</div>
        <div id="timer-controls">
          <button id="btn-timer-start">Start</button>
          <button id="btn-timer-reset">Reset</button>
        </div>
      </div>
    </aside>
  </div>

  <footer id="controller-footer">
    <div id="status-line">Currently Displaying: None</div>
    <div id="nav-hint">← → Navigate slides &nbsp;|&nbsp; Space: Start/Pause timer &nbsp;|&nbsp; R: Reset timer</div>
  </footer>

  <script src="controller.js"></script>
</body>
</html>
